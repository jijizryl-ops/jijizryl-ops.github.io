<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vibe Catcher - Jijiz Games</title>
    <style>
        body { margin: 0; overflow: hidden; background: #FFDEE9; font-family: sans-serif; }
        canvas { display: block; background: linear-gradient(0deg, #FFDEE9 0%, #B5FFFC 100%); }
        .ui {
            position: absolute; top: 20px; left: 20px;
            font-size: 24px; font-weight: bold; color: #ff4757;
            pointer-events: none; text-shadow: 1px 1px white;
        }
        .back-btn {
            position: absolute; top: 20px; right: 20px;
            padding: 10px 20px; background: #ff4757; color: white;
            border: none; border-radius: 20px; cursor: pointer; text-decoration: none; z-index: 10;
        }
    </style>
</head>
<body>

    <div class="ui">Vibes: <span id="score">0</span> | Lives: <span id="lives">3</span></div>
    <a href="gamehub.html" class="back-btn">Exit Hub</a>
    <canvas id="vibeCanvas"></canvas>

<script>
    const canvas = document.getElementById('vibeCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const livesElement = document.getElementById('lives');

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    let score = 0;
    let lives = 3;
    let gameActive = true;

    // Load Character
    const playerImg = new Image();
    playerImg.src = 'thumbsup.png';

    const player = {
        x: canvas.width / 2 - 40,
        y: canvas.height - 120,
        width: 80,
        height: 80,
        speed: 15
    };

    const items = [];
    let itemTimer = 0;

    // Control Logic
    let targetX = player.x;
    window.addEventListener('mousemove', (e) => { targetX = e.clientX - player.width / 2; });
    window.addEventListener('touchmove', (e) => { 
        targetX = e.touches[0].clientX - player.width / 2; 
        e.preventDefault();
    }, {passive: false});

    function spawnItem() {
        const isBug = Math.random() > 0.7; // 30% chance na Bug ang lumabas
        items.push({
            x: Math.random() * (canvas.width - 40),
            y: -50,
            width: 40,
            height: 40,
            type: isBug ? 'bug' : 'vibe',
            speed: 3 + Math.random() * 4 + (score / 100)
        });
    }

    function update() {
        if (!gameActive) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Smooth movement
        player.x += (targetX - player.x) * 0.2;

        // Draw Player
        ctx.drawImage(playerImg, player.x, player.y, player.width, player.height);

        // Items Logic
        itemTimer++;
        if (itemTimer > 40) {
            spawnItem();
            itemTimer = 0;
        }

        items.forEach((item, index) => {
            item.y += item.speed;

            // Draw Item
            if (item.type === 'vibe') {
                ctx.fillStyle = '#f1c40f'; // Gold for vibes
                ctx.beginPath();
                ctx.arc(item.x + 20, item.y + 20, 15, 0, Math.PI * 2);
                ctx.fill();
            } else {
                ctx.fillStyle = '#2f3542'; // Dark for bugs
                ctx.fillRect(item.x, item.y, 30, 30);
            }

            // Collision Detection
            
            if (
                player.x < item.x + item.width &&
                player.x + player.width > item.x &&
                player.y < item.y + item.height &&
                player.y + player.height > item.y
            ) {
                items.splice(index, 1);
                if (item.type === 'vibe') {
                    score += 5;
                    scoreElement.innerText = score;
                } else {
                    lives--;
                    livesElement.innerText = lives;
                    if (lives <= 0) gameOver();
                }
            }

            // Remove if out of screen
            if (item.y > canvas.height) {
                items.splice(index, 1);
            }
        });

        requestAnimationFrame(update);
    }

    function gameOver() {
        gameActive = false;
        ctx.fillStyle = 'rgba(0,0,0,0.8)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = 'white';
        ctx.textAlign = 'center';
        ctx.font = 'bold 40px Arial';
        ctx.fillText('OUT OF VIBES!', canvas.width / 2, canvas.height / 2);
        ctx.font = '20px Arial';
        ctx.fillText('Score: ' + score, canvas.width / 2, canvas.height / 2 + 50);
        ctx.fillText('Tap to Try Again', canvas.width / 2, canvas.height / 2 + 100);
    }

    window.addEventListener('mousedown', () => { if(!gameActive) location.reload(); });
    playerImg.onload = update;
</script>
</body>
</html>
