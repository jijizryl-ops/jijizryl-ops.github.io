<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reels | Jizryl S. Arboleda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* ── REEL CONTAINER ── */
        .reel-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .reel-container {
            position: relative;
            width: 100%;
            padding-top: 177.78%; /* 9:16 */
            background-color: #000;
            border-radius: 18px;
            overflow: hidden;
            border: 2px solid #333;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .reel-container:hover,
        .reel-container.playing {
            border-color: #ffc107;
            box-shadow: 0 0 20px rgba(255, 193, 7, 0.2);
        }

        .reel-container video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }

        /* ── PLAY OVERLAY ── */
        .reel-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.45);
            transition: opacity 0.3s ease;
            z-index: 2;
        }

        .reel-container.playing .reel-overlay {
            opacity: 0;
            pointer-events: none;
        }

        .reel-container.playing:hover .reel-overlay {
            opacity: 1;
        }

        /* ── PLAY ICON ── */
        .play-icon {
            width: 56px; height: 56px;
            border-radius: 50%;
            background: rgba(255, 193, 7, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1),
                        background 0.2s ease;
            margin-bottom: 10px;
        }

        .reel-container:hover .play-icon {
            transform: scale(1.12);
            background: #ffc107;
        }

        .play-icon svg {
            width: 22px; height: 22px;
            fill: #000;
            margin-left: 3px; /* optical centering for play triangle */
            transition: opacity 0.2s;
        }

        .pause-icon svg {
            margin-left: 0;
        }

        .overlay-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: rgba(255,255,255,0.8);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* ── PROGRESS BAR ── */
        .reel-progress {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 3px;
            background: rgba(255,255,255,0.15);
            z-index: 3;
        }

        .reel-progress-fill {
            height: 100%;
            width: 0%;
            background: #ffc107;
            transition: width 0.1s linear;
            border-radius: 0 2px 2px 0;
        }

        /* ── LABEL ── */
        .reel-label {
            font-size: 0.82rem;
            color: #888;
            margin-top: 10px;
            text-align: center;
            font-weight: 500;
            transition: color 0.3s;
        }

        .reel-container.playing ~ .reel-label,
        .reel-wrap:hover .reel-label {
            color: #ffc107;
        }

        /* ── NAV ── */
        .reels-nav {
            background: rgba(10,10,10,0.9);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255,193,7,0.2);
        }
    </style>
</head>
<body class="bg-dark text-white">

    <nav class="py-3 sticky-top reels-nav">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="index.html" class="text-decoration-none text-secondary fw-bold" style="transition:color .3s" onmouseover="this.style.color='#ffc107'" onmouseout="this.style.color=''">← Back to Home</a>
            <span class="text-warning fw-bold small text-uppercase">&lt;Reels/&gt;</span>
            <div class="ms-auto">
                <button class="btn btn-dark btn-sm" onclick="toggleTheme()" id="theme-btn">🌙 Dark Mode</button>
            </div>
        </div>
    </nav>

    <div class="container my-5 text-center">
        <h1 class="display-5 fw-bold text-warning mb-2">Shorts & Reels</h1>
        <p class="text-secondary mb-2">Quick clips of my editing skills, technical process and project demos.</p>
        <p class="small mb-5" style="color:#555">
            <span class="d-none d-md-inline">Hover to play &nbsp;·&nbsp; </span>
            Tap to play/pause on mobile
        </p>

        <div class="row g-4 justify-content-center">

            <div class="col-6 col-md-4 col-lg-3">
                <div class="reel-wrap">
                    <div class="reel-container" data-reel="0">
                        <video loop muted playsinline preload="metadata">
                            <source src="reel1.mp4" type="video/mp4">
                        </video>
                        <div class="reel-overlay">
                            <div class="play-icon">
                                <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
                            </div>
                            <span class="overlay-label">Play</span>
                        </div>
                        <div class="reel-progress">
                            <div class="reel-progress-fill"></div>
                        </div>
                    </div>
                    <p class="reel-label">Self Editing Intro</p>
                </div>
            </div>

            <div class="col-6 col-md-4 col-lg-3">
                <div class="reel-wrap">
                    <div class="reel-container" data-reel="1">
                        <video loop muted playsinline preload="metadata">
                            <source src="reel2.mp4" type="video/mp4">
                        </video>
                        <div class="reel-overlay">
                            <div class="play-icon">
                                <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
                            </div>
                            <span class="overlay-label">Play</span>
                        </div>
                        <div class="reel-progress">
                            <div class="reel-progress-fill"></div>
                        </div>
                    </div>
                    <p class="reel-label">My Canva Website</p>
                </div>
            </div>

        </div>
    </div>

    <footer class="main-footer mt-5">
        <div class="container text-center">
            <p class="mb-1">© 2026 Jizryl Arboleda | Portfolio Website</p>
            <small>Aspiring MIS Officer & Data Analyst</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
    <script>
    (function () {
        const reels = document.querySelectorAll('.reel-container');

        reels.forEach(function (container) {
            const video    = container.querySelector('video');
            const overlay  = container.querySelector('.reel-overlay');
            const label    = container.querySelector('.overlay-label');
            const fill     = container.querySelector('.reel-progress-fill');
            const icon     = container.querySelector('.play-icon svg');
            let rafId      = null;

            // ── PLAY ICON SHAPES ──
            const playPath  = 'polygon points="5,3 19,12 5,21"';
            const pausePath = 'polygon points="6,3 10,3 10,21 6,21"';
            const pausePath2= 'polygon points="14,3 18,3 18,21 14,21"';

            function updateProgress() {
                if (video.duration) {
                    fill.style.width = (video.currentTime / video.duration * 100) + '%';
                }
                rafId = requestAnimationFrame(updateProgress);
            }

            function play() {
                video.play();
                container.classList.add('playing');
                label.textContent = 'Pause';
                icon.innerHTML = '<polygon points="6,3 10,3 10,21 6,21"/><polygon points="14,3 18,3 18,21 14,21"/>';
                rafId = requestAnimationFrame(updateProgress);
            }

            function pause() {
                video.pause();
                container.classList.remove('playing');
                label.textContent = 'Play';
                icon.innerHTML = '<polygon points="5,3 19,12 5,21"/>';
                cancelAnimationFrame(rafId);
            }

            function toggle() {
                video.paused ? play() : pause();
            }

            // ── CLICK / TAP ── works on both mobile and desktop
            container.addEventListener('click', toggle);

            // ── HOVER ── desktop only, don't override tap state on mobile
            const isTouchDevice = () => window.matchMedia('(hover: none)').matches;

            container.addEventListener('mouseenter', function () {
                if (!isTouchDevice() && video.paused) play();
            });

            container.addEventListener('mouseleave', function () {
                if (!isTouchDevice() && !video.paused) pause();
            });
        });
    })();
    </script>
</body>
</html>
