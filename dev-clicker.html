<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Clicker | Jijiz Game Hub</title>
    <style>
        :root {
            --dev-green: #00ff41;
            --terminal-bg: #0d0d0d;
        }
        body { 
            margin: 0; 
            background: var(--terminal-bg); 
            color: var(--dev-green); 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
        }
        .header { position: absolute; top: 20px; text-align: center; }
        .stats { font-size: 1.2rem; margin-bottom: 20px; color: #fff; }
        
        /* Terminal Window */
        .terminal {
            width: 90%;
            max-width: 600px;
            height: 300px;
            background: #000;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 15px;
            overflow-y: auto;
            margin-bottom: 30px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
        }
        .line { margin-bottom: 5px; font-size: 0.9rem; }

        /* Click Area */
        .laptop-area {
            cursor: pointer;
            transition: transform 0.1s;
        }
        .laptop-area:active { transform: scale(0.95); }
        .laptop-img { width: 150px; filter: drop-shadow(0 0 10px var(--dev-green)); }

        .progress-container {
            width: 80%;
            max-width: 400px;
            height: 20px;
            background: #222;
            border-radius: 10px;
            margin-top: 20px;
            border: 1px solid #444;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--dev-green);
            border-radius: 10px;
            transition: width 0.1s;
        }
        .back-btn {
            position: absolute; top: 20px; right: 20px;
            padding: 10px 20px; background: #333; color: white;
            border: none; border-radius: 5px; text-decoration: none;
        }
    </style>
</head>
<body>

    <a href="gamehub.html" class="back-btn">Exit Sprint</a>

    <div class="header">
        <h1>Sprinting: Feature Build</h1>
        <div class="stats">Features Shipped: <span id="shipped">0</span></div>
    </div>

    <div class="terminal" id="terminal">
        <div class="line">> Initializing repository...</div>
        <div class="line">> System ready. Start clicking to code.</div>
    </div>

    <div class="laptop-area" id="clickTarget">
        <img src="laptop.png" alt="Code" class="laptop-img">
    </div>

    <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
    </div>
    <p id="statusText">Feature Progress: 0%</p>

<script>
    let progress = 0;
    let shippedCount = 0;
    const terminal = document.getElementById('terminal');
    const progressBar = document.getElementById('progressBar');
    const shippedElement = document.getElementById('shipped');
    const statusText = document.getElementById('statusText');

    const codeLines = [
        "const api = new Connection();",
        "import { gravity } from 'physics';",
        "function shipFeature() {",
        "  console.log('Deploying...');",
        "  repo.push('origin main');",
        "  status: 'Ready for Production'",
        "}"
    ];

    function addTerminalLine(text) {
        const line = document.createElement('div');
        line.className = 'line';
        line.innerText = `> ${text}`;
        terminal.appendChild(line);
        terminal.scrollTop = terminal.scrollHeight;
        if (terminal.childNodes.length > 10) terminal.removeChild(terminal.firstChild);
    }

    function handleCodeClick() {
        progress += 5; // Each click adds 5% progress
        
        // Pick a random code snippet to display
        const randomCode = codeLines[Math.floor(Math.random() * codeLines.length)];
        addTerminalLine(randomCode);

        if (progress >= 100) {
            shippedCount++;
            shippedElement.innerText = shippedCount;
            addTerminalLine("✔ FEATURE SHIPPED SUCCESSFULLY!");
            progress = 0;
        }

        progressBar.style.width = progress + "%";
        statusText.innerText = `Feature Progress: ${progress}%`;
    }

    // Keyboard and Click Support
    document.getElementById('clickTarget').addEventListener('click', handleCodeClick);
    window.addEventListener('keydown', (e) => {
        // Any key works as a "keystroke" to simulate coding
        handleCodeClick();
    });
</script>
</body>
</html>
